interface:
  display_name: "延迟认证"
  short_description: "先完成可做的工作，把登录授权推迟到真正必要时。"
  default_prompt: "对此任务使用延迟认证：在要求我登录前，尽可能先完成可完成的工作；如果无法认证，请产出当前最佳可用成果。"
compatibility:
  canonical_format: "agent-skills"
  adapter_targets:
    - "openai"
    - "claude"
    - "generic"
    - "vscode"
  activation:
    mode: "manual"
    paths: []
  execution:
    context: "inline"
    shell: "powershell"
  trust:
    source_tier: "local"
    remote_inline_execution: "forbid"
    remote_metadata_policy: "allow-metadata-only"
  degradation:
    openai: "metadata-adapter"
    claude: "neutral-source-plus-adapter"
    generic: "neutral-source"
    vscode: "agent-skills-source-with-vscode-notes"
